<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面 - 选必二逻辑框架</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; }
.cover {
  width: 1440px; height: 1080px;
  background: linear-gradient(135deg, #0a1628 0%, #1a2744 60%, #1e3a5f 100%);
  position: relative; overflow: hidden;
  font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
}

/* 背景纹理 */
.cover::before {
  content: '⚖️📖🔨⚖️📖🔨⚖️📖🔨';
  position: absolute; top: 0; right: 0;
  width: 60%; height: 100%;
  font-size: 80px; line-height: 120px;
  opacity: 0.04; word-break: break-all;
  pointer-events: none;
}

/* 左上角标签 */
.tag {
  position: absolute; top: 36px; left: 36px;
  background: rgba(59,130,246,0.3);
  border: 1px solid rgba(59,130,246,0.6);
  border-radius: 8px; padding: 10px 18px;
  color: #93c5fd; font-size: 20px; font-weight: 500;
  backdrop-filter: blur(8px);
}
.tag span { font-size: 22px; margin-right: 4px; }

/* 主标题区 */
.title-area {
  position: absolute; top: 120px; left: 0; right: 0;
  text-align: center;
}
.subtitle-top {
  color: rgba(255,255,255,0.85);
  font-size: 42px; font-weight: 400;
  letter-spacing: 4px;
  margin-bottom: 12px;
}
.main-title {
  font-size: 82px; font-weight: 900;
  color: #FFD700;
  letter-spacing: 24px;
  text-shadow: 0 0 30px rgba(255,215,0,0.5), 0 0 60px rgba(255,215,0,0.2);
}
.main-title-q {
  color: #fff;
  text-shadow: 0 0 20px rgba(255,255,255,0.4);
}

/* 逻辑链区域 */
.chain {
  position: absolute; top: 400px; left: 50%; transform: translateX(-50%);
  display: flex; align-items: center; gap: 0;
}
.card {
  width: 200px; height: 220px;
  border-radius: 16px; padding: 20px 16px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.card-blue { background: linear-gradient(180deg, #3B82F6, #2563EB); }
.card-green { background: linear-gradient(180deg, #10B981, #059669); }
.card-orange { background: linear-gradient(180deg, #F59E0B, #D97706); }
.card-red { background: linear-gradient(180deg, #EF4444, #DC2626); }

.card-emoji { font-size: 42px; margin-bottom: 10px; }
.card-label {
  color: #fff; font-size: 28px; font-weight: 700;
  letter-spacing: 4px; margin-bottom: 4px;
}
.card-sub {
  color: #fff; font-size: 22px; font-weight: 500;
  letter-spacing: 2px; margin-bottom: 12px;
}
.card-tag {
  background: rgba(255,255,255,0.2);
  border-radius: 20px; padding: 4px 14px;
  color: rgba(255,255,255,0.9); font-size: 16px;
}

/* 箭头 */
.arrow {
  width: 60px; display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,0.7); font-size: 36px; font-weight: 300;
}

/* 底部虚线说明 */
.flow-line {
  position: absolute; top: 660px; left: 50%; transform: translateX(-50%);
  width: 900px; text-align: center;
}
.flow-arrow {
  width: 100%; height: 2px;
  background: repeating-linear-gradient(90deg, rgba(255,255,255,0.4) 0, rgba(255,255,255,0.4) 10px, transparent 10px, transparent 20px);
  margin-bottom: 10px; position: relative;
}
.flow-arrow::after {
  content: '▶'; position: absolute; right: -10px; top: -10px;
  color: rgba(255,255,255,0.5); font-size: 18px;
}
.flow-text {
  color: rgba(255,255,255,0.6); font-size: 22px;
  letter-spacing: 8px;
}

/* 底部栏 */
.bottom-bar {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 90px;
  background: rgba(0,0,0,0.45);
  backdrop-filter: blur(12px);
  display: flex; align-items: center; justify-content: center;
  gap: 40px;
}
.bottom-left {
  color: #fff; font-size: 26px; font-weight: 500;
  letter-spacing: 2px;
}
.bottom-left span { color: #FFD700; margin-right: 8px; }
.bottom-divider {
  width: 2px; height: 30px;
  background: rgba(255,255,255,0.3);
}
.bottom-right {
  color: rgba(255,255,255,0.7); font-size: 24px;
  letter-spacing: 2px;
}
.bottom-right span { margin-right: 4px; }

/* 装饰光效 */
.glow1 {
  position: absolute; top: -100px; right: -100px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
  border-radius: 50%;
}
.glow2 {
  position: absolute; bottom: 100px; left: -80px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(239,68,68,0.1) 0%, transparent 70%);
  border-radius: 50%;
}
</style>
</head>
<body>
<div class="cover">
  <!-- 装饰光效 -->
  <div class="glow1"></div>
  <div class="glow2"></div>

  <!-- 左上角标签 -->
  <div class="tag"><span>📚</span> 高中政治 · 选必二专题</div>

  <!-- 主标题 -->
  <div class="title-area">
    <div class="subtitle-top">选必二《法律与生活》</div>
    <div class="main-title">这 么 编 <span class="main-title-q">？</span></div>
  </div>

  <!-- 四单元逻辑链 -->
  <div class="chain">
    <div class="card card-blue">
      <div class="card-emoji">👤</div>
      <div class="card-label">个人</div>
      <div class="card-sub">权利</div>
      <div class="card-tag">实体法</div>
    </div>
    <div class="arrow">→</div>
    <div class="card card-green">
      <div class="card-emoji">👨‍👩‍👧</div>
      <div class="card-label">家庭</div>
      <div class="card-sub">婚姻</div>
      <div class="card-tag">实体法</div>
    </div>
    <div class="arrow">→</div>
    <div class="card card-orange">
      <div class="card-emoji">💼</div>
      <div class="card-label">职场</div>
      <div class="card-sub">创业</div>
      <div class="card-tag">实体法</div>
    </div>
    <div class="arrow">→</div>
    <div class="card card-red">
      <div class="card-emoji">⚖️</div>
      <div class="card-label">争议</div>
      <div class="card-sub">解决</div>
      <div class="card-tag">程序法</div>
    </div>
  </div>

  <!-- 底部虚线 -->
  <div class="flow-line">
    <div class="flow-arrow"></div>
    <div class="flow-text">社会关系不断向外拓展</div>
  </div>

  <!-- 底部栏 -->
  <div class="bottom-bar">
    <div class="bottom-left"><span>💡</span>3分钟看懂整本书逻辑</div>
    <div class="bottom-divider"></div>
    <div class="bottom-right"><span>🌼</span>坚韧的金盏花花</div>
  </div>
</div>
</body>
</html>
