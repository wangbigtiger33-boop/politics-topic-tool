<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高中政治选题库 Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <header>
    <h1>📚 高中政治选题库 Pro</h1>
    <nav>
      <button class="tab active" data-tab="topics">选题管理</button>
      <button class="tab" data-tab="dashboard">数据看板</button>
      <button class="tab" data-tab="recommend">智能推荐</button>
    </nav>
  </header>

  <main>
    <!-- 选题管理 -->
    <section id="topics" class="panel active">
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="搜索标题、考点、关键词、钩子...">
        <div class="filters">
          <select id="filterGrade"><option value="">全部年级</option><option>高一</option><option>高二</option><option>高三</option><option>通用</option></select>
          <select id="filterCategory"><option value="">全部分类</option>
            <option>1.流量获客类</option>
            <option>2.信任建立类</option>
            <option>3.变现转化类</option>
            <option>4.辅助选题</option>
          </select>
          <select id="filterType"><option value="">全部类型</option>
            <option>a.热点政治解读</option>
            <option>b.学科价值重塑</option>
            <option>c.考试避坑指南</option>
            <option>d.学习方法论</option>
            <option>a.干货知识拆解</option>
            <option>b.真题逻辑复盘</option>
            <option>c.备考进度规划</option>
            <option>d.作业/试卷点评</option>
            <option>a.课程精华片段</option>
            <option>b.学员反馈见证</option>
            <option>c.课程大纲解读</option>
            <option>d.限时变现活动</option>
            <option>a.教师日常生活</option>
            <option>b.教育观念碰撞</option>
          </select>
          <select id="filterStatus"><option value="">全部状态</option><option>待策划</option><option>待拍摄</option><option>拍摄中</option><option>待发布</option><option>已发布</option></select>
          <select id="filterPriority"><option value="">全部优先级</option><option value="high">高(8-10)</option><option value="mid">中(5-7)</option><option value="low">低(1-4)</option></select>
        </div>
        <div class="actions">
          <button id="btnAdd" class="btn-primary">+ 新增选题</button>
          <button id="btnImport" class="btn-secondary">导入CSV</button>
          <button id="btnExport" class="btn-secondary">导出CSV</button>
          <input type="file" id="fileImport" accept=".csv" hidden>
        </div>
      </div>
      <div class="stats-bar" id="statsBar"></div>
      <div id="topicList"></div>
    </section>

    <!-- 数据看板 -->
    <section id="dashboard" class="panel">
      <div class="dashboard-grid">
        <div class="card" id="cardOverview"><h3>📊 总览</h3><div class="card-body"></div></div>
        <div class="card" id="cardCategory"><h3>📖 分类流量排行</h3><div class="card-body"></div></div>
        <div class="card" id="cardType"><h3>🎯 内容类型对比</h3><div class="card-body"></div></div>
        <div class="card" id="cardChannel"><h3>📱 发布渠道分析</h3><div class="card-body"></div></div>
        <div class="card" id="cardHook"><h3>🎣 钩子效果分析</h3><div class="card-body"></div></div>
        <div class="card" id="cardTime"><h3>⏰ 发布时间分析</h3><div class="card-body"></div></div>
        <div class="card" id="cardConversion"><h3>💰 转化漏斗</h3><div class="card-body"></div></div>
        <div class="card" id="cardKeywords"><h3>🔑 高流量关键词</h3><div class="card-body"></div></div>
      </div>
    </section>

    <!-- 智能推荐 -->
    <section id="recommend" class="panel">
      <div class="recommend-grid">
        <div class="card" id="cardHotDir"><h3>🔥 高潜力方向</h3><div class="card-body"></div></div>
        <div class="card" id="cardUncovered"><h3>🕳️ 未覆盖考点</h3><div class="card-body"></div></div>
        <div class="card" id="cardRedo"><h3>♻️ 值得翻新</h3><div class="card-body"></div></div>
        <div class="card" id="cardNext"><h3>💡 下一步建议</h3><div class="card-body"></div></div>
      </div>
    </section>
  </main>

  <!-- 弹窗 -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">新增选题</h2>
        <button id="modalClose">&times;</button>
      </div>
      <form id="topicForm">
        <div class="form-tabs">
          <button type="button" class="ftab active" data-ftab="basic">基本信息</button>
          <button type="button" class="ftab" data-ftab="content">内容策划</button>
          <button type="button" class="ftab" data-ftab="publish">发布信息</button>
          <button type="button" class="ftab" data-ftab="traffic">流量数据</button>
          <button type="button" class="ftab" data-ftab="review">复盘</button>
        </div>

        <!-- 基本信息 -->
        <div class="ftab-panel active" id="ftab-basic">
          <div class="form-grid">
            <div class="form-group full-width"><label>选题标题 *</label><input type="text" name="title" required></div>
            <div class="form-group"><label>系列/栏目</label><input type="text" name="series"></div>
            <div class="form-group"><label>一级分类（母题）</label><select name="category1">
              <option value="">请选择</option>
              <option>1.流量获客类</option>
              <option>2.信任建立类</option>
              <option>3.变现转化类</option>
              <option>4.辅助选题</option>
            </select></div>
            <div class="form-group"><label>二级分类（内容类型）</label><select name="category2" id="category2Select">
              <option value="">请选择</option>
            </select></div>
            <div class="form-group"><label>题型</label><input type="text" name="questionType"></div>
            <div class="form-group"><label>对应考点/章节</label><input type="text" name="examPoint"></div>
            <div class="form-group"><label>关键词标签</label><input type="text" name="keywords" placeholder="3-5个，逗号隔开"></div>
            <div class="form-group"><label>目标年级/人群</label><select name="grade"><option>高一</option><option>高二</option><option selected>高三</option><option>通用</option></select></div>
            <div class="form-group"><label>优先级(1-10)</label><input type="number" name="priority" min="1" max="10" value="5"></div>
            <div class="form-group"><label>制作状态</label><select name="status"><option>待策划</option><option>待拍摄</option><option>拍摄中</option><option>待发布</option><option>已发布</option></select></div>
            <div class="form-group"><label>负责人</label><input type="text" name="owner"></div>
            <div class="form-group"><label>计划拍摄日</label><input type="date" name="planShootDate"></div>
            <div class="form-group"><label>计划发布日期</label><input type="date" name="planPublishDate"></div>
          </div>
        </div>

        <!-- 内容策划 -->
        <div class="ftab-panel" id="ftab-content">
          <div class="form-grid">
            <div class="form-group full-width"><label>场景/触发</label><input type="text" name="scene" placeholder="学生什么时候会搜这个"></div>
            <div class="form-group full-width"><label>核心矛盾（他们卡在哪）</label><textarea name="coreProblem" rows="2"></textarea></div>
            <div class="form-group full-width"><label>价值承诺（看完收获）</label><textarea name="valuePromise" rows="2"></textarea></div>
            <div class="form-group full-width"><label>钩子一句话（前3秒）</label><input type="text" name="hook"></div>
            <div class="form-group full-width"><label>结构大纲（3点）</label><textarea name="outline" rows="3" placeholder="1. xxx&#10;2. xxx&#10;3. xxx"></textarea></div>
            <div class="form-group full-width"><label>例题/案例来源</label><input type="text" name="caseSource"></div>
            <div class="form-group full-width"><label>你提供的解法（一句话）</label><input type="text" name="solution"></div>
            <div class="form-group full-width"><label>可抄模板/关键句</label><textarea name="templateSentence" rows="2"></textarea></div>
            <div class="form-group"><label>资料钩子（领什么）</label><input type="text" name="materialHook"></div>
            <div class="form-group"><label>转化动作（评论/私信关键词）</label><input type="text" name="conversionAction"></div>
            <div class="form-group full-width"><label>产品承接（试听/课包/1v1）</label><input type="text" name="productLink"></div>
          </div>
        </div>

        <!-- 发布信息 -->
        <div class="ftab-panel" id="ftab-publish">
          <div class="form-grid">
            <div class="form-group"><label>实际发布日期</label><input type="date" name="publishDate"></div>
            <div class="form-group"><label>发布渠道</label><input type="text" name="channel" placeholder="抖音/小红书/B站/视频号"></div>
            <div class="form-group"><label>发布时间段</label><input type="text" name="publishTime" placeholder="如 21:00"></div>
            <div class="form-group"><label>时长（秒）</label><input type="number" name="duration"></div>
            <div class="form-group"><label>封面6字大字</label><input type="text" name="coverTitle" maxlength="8"></div>
            <div class="form-group"><label>封面副标题（12字）</label><input type="text" name="coverSub" maxlength="15"></div>
            <div class="form-group full-width"><label>标题A</label><input type="text" name="titleA"></div>
            <div class="form-group full-width"><label>标题B</label><input type="text" name="titleB"></div>
            <div class="form-group full-width"><label>标题C</label><input type="text" name="titleC"></div>
            <div class="form-group full-width"><label>发布链接</label><input type="text" name="publishUrl"></div>
          </div>
        </div>

        <!-- 流量数据 -->
        <div class="ftab-panel" id="ftab-traffic">
          <div class="form-grid">
            <div class="form-group"><label>播放量</label><input type="number" name="views"></div>
            <div class="form-group"><label>完播率</label><input type="text" name="finishRate" placeholder="如 42%"></div>
            <div class="form-group"><label>平均观看时长（秒）</label><input type="number" name="avgWatch"></div>
            <div class="form-group"><label>点赞数</label><input type="number" name="likes"></div>
            <div class="form-group"><label>收藏数</label><input type="number" name="favs"></div>
            <div class="form-group"><label>评论数</label><input type="number" name="comments"></div>
            <div class="form-group"><label>转发数</label><input type="number" name="shares"></div>
            <div class="form-group"><label>私信/咨询数</label><input type="number" name="inquiries"></div>
            <div class="form-group full-width"><label>转化结果（加微/报名/成交）</label><input type="text" name="conversionResult"></div>
          </div>
        </div>

        <!-- 复盘 -->
        <div class="ftab-panel" id="ftab-review">
          <div class="form-grid">
            <div class="form-group full-width"><label>评论区高频问题</label><textarea name="topComments" rows="3"></textarea></div>
            <div class="form-group full-width"><label>复盘要点（为什么好/差）</label><textarea name="reviewNotes" rows="3"></textarea></div>
            <div class="form-group full-width"><label>下一条延伸选题</label><input type="text" name="nextTopic"></div>
            <div class="form-group full-width"><label>下次优化动作（1句话）</label><input type="text" name="nextAction"></div>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="btnDelete" class="btn-danger hidden">删除</button>
          <button type="submit" class="btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
